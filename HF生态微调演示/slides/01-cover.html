<!DOCTYPE html>

<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body { background: var(--bg); }
  .brand-bar {
    position: absolute; top: 0; left: 0; width: 8px; height: 1080px;
    background: var(--accent);
  }
  .deco-year {
    position: absolute; bottom: -20px; right: 80px;
    font-family: var(--display); font-size: 200px; font-weight: 700;

  .bottom-info {
    position: absolute; bottom: 80px; left: 100px; right: 100px;
    display: flex; justify-content: space-between; align-items: flex-end;

  .bottom-meta p {
    font-size: 16px; color: var(--ink-muted); line-height: 1.7;
  }
  .bottom-meta p:first-child { font-weight: 500; color: var(--ink); }
  .bottom-tag {

<body>
<div class="brand-bar"></div>
