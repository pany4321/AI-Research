<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900">
  <defs>
    <linearGradient id="step1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d35400;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step4Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step5Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a2e">完整微调训练流程图 —— 从数据到部署</text>

  <!-- Step 1: Data Preparation -->
  <g transform="translate(50, 70)" filter="url(#shadow)">
    <rect width="900" height="100" rx="10" fill="url(#step1Grad)"/>
    <text x="450" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#fff">📥 步骤 1: 数据准备</text>

    <g transform="translate(20, 45)">
      <rect width="160" height="40" rx="5" fill="rgba(255,255,255,0.3)"/>
      <text x="80" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">JSONL/CSV 文件</text>

      <line x1="170" y1="20" x2="190" y2="20" stroke="#fff" stroke-width="2"/>

      <rect x="200" width="160" height="40" rx="5" fill="rgba(255,255,255,0.3)"/>
      <text x="280" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">load_dataset()</text>

      <line x1="370" y1="20" x2="390" y2="20" stroke="#fff" stroke-width="2"/>

      <rect x="400" width="160" height="40" rx="5" fill="rgba(255,255,255,0.3)"/>
      <text x="480" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">map() 预处理</text>

      <line x1="570" y1="20" x2="590" y2="20" stroke="#fff" stroke-width="2"/>

      <rect x="600" width="160" height="40" rx="5" fill="rgba(255,255,255,0.3)"/>
      <text x="680" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">apply_template()</text>

      <line x1="770" y1="20" x2="790" y2="20" stroke="#fff" stroke-width="2"/>

      <rect x="800" width="80" height="40" rx="5" fill="rgba(255,255,255,0.5)"/>
      <text x="840" y="25" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">Dataset</text>
    </g>
  </g>

  <!-- Arrow -->
  <line x1="500" y1="180" x2="500" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Model Loading -->
  <g transform="translate(50, 210)" filter="url(#shadow)">
    <rect width="900" height="100" rx="10" fill="url(#step2Grad)"/>
    <text x="450" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#fff">📦 步骤 2: 加载基础模型</text>

    <g transform="translate(20, 45)">
      <rect width="180" height="40" rx="5" fill="rgba(255,255,255,0.3)"/>
      <text x="90" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">AutoModel.from_pretrained</text>

      <line x1="190" y1="20" x2="210" y2="20" stroke="#fff" stroke-width="2"/>

      <rect x="220" width="140" height="40" rx="5" fill="rgba(255,255,255,0.3)"/>
      <text x="290" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">config.json</text>

      <line x1="370" y1="20" x2="390" y2="20" stroke="#fff" stroke-width="2"/>

      <rect x="400" width="140" height="40" rx="5" fill="rgba(255,255,255,0.3)"/>
      <text x="470" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">model.safetensors</text>

      <line x1="550" y1="20" x2="570" y2="20" stroke="#fff" stroke-width="2"/>

      <rect x="580" width="140" height="40" rx="5" fill="rgba(255,255,255,0.3)"/>
      <text x="650" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">device_map="auto"</text>

      <line x1="730" y1="20" x2="750" y2="20" stroke="#fff" stroke-width="2"/>

      <rect x="760" width="120" height="40" rx="5" fill="rgba(255,255,255,0.5)"/>
      <text x="820" y="25" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">PreTrainedModel</text>
    </g>
  </g>

  <!-- Arrow -->
  <line x1="500" y1="320" x2="500" y2="340" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: PEFT Injection -->
  <g transform="translate(50, 350)" filter="url(#shadow)">
    <rect width="900" height="100" rx="10" fill="url(#step3Grad)"/>
    <text x="450" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#fff">🔧 步骤 3: 注入 LoRA 适配器</text>

    <g transform="translate(20, 45)">
      <rect width="140" height="40" rx="5" fill="rgba(255,255,255,0.3)"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">LoraConfig</text>

      <line x1="150" y1="20" x2="170" y2="20" stroke="#fff" stroke-width="2"/>

      <rect x="180" width="140" height="40" rx="5" fill="rgba(255,255,255,0.3)"/>
      <text x="250" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">r=16, alpha=32</text>

      <line x1="330" y1="20" x2="350" y2="20" stroke="#fff" stroke-width="2"/>

      <rect x="360" width="140" height="40" rx="5" fill="rgba(255,255,255,0.3)"/>
      <text x="430" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">target_modules</text>

      <line x1="510" y1="20" x2="530" y2="20" stroke="#fff" stroke-width="2"/>

      <rect x="540" width="140" height="40" rx="5" fill="rgba(255,255,255,0.3)"/>
      <text x="610" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">get_peft_model()</text>

      <line x1="690" y1="20" x2="710" y2="20" stroke="#fff" stroke-width="2"/>

      <rect x="720" width="160" height="40" rx="5" fill="rgba(255,255,255,0.5)"/>
      <text x="800" y="25" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">PeftModel (可训练)</text>
    </g>
  </g>

  <!-- Arrow -->
  <line x1="500" y1="460" x2="500" y2="480" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4: Accelerate Prepare -->
  <g transform="translate(50, 490)" filter="url(#shadow)">
    <rect width="900" height="100" rx="10" fill="url(#step4Grad)"/>
    <text x="450" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#fff">⚡ 步骤 4: 分布式训练准备</text>

    <g transform="translate(20, 45)">
      <rect width="120" height="40" rx="5" fill="rgba(255,255,255,0.3)"/>
      <text x="60" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">Accelerator</text>

      <line x1="130" y1="20" x2="150" y2="20" stroke="#fff" stroke-width="2"/>

      <rect x="160" width="120" height="40" rx="5" fill="rgba(255,255,255,0.3)"/>
      <text x="220" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">prepare(model)</text>

      <line x1="290" y1="20" x2="310" y2="20" stroke="#fff" stroke-width="2"/>

      <rect x="320" width="120" height="40" rx="5" fill="rgba(255,255,255,0.3)"/>
      <text x="380" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">DDP/FSDP/DS</text>

      <line x1="450" y1="20" x2="470" y2="20" stroke="#fff" stroke-width="2"/>

      <rect x="480" width="120" height="40" rx="5" fill="rgba(255,255,255,0.3)"/>
      <text x="540" y="25" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">bf16 混合精度</text>

      <line x1="610" y1="20" x2="630" y2="20" stroke="#fff" stroke-width="2"/>

      <rect x="640" width="240" height="40" rx="5" fill="rgba(255,255,255,0.5)"/>
      <text x="760" y="25" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">分布式模型 + 优化器 + DataLoader</text>
    </g>
  </g>

  <!-- Arrow -->
  <line x1="500" y1="600" x2="500" y2="620" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 5: Training Loop -->
  <g transform="translate(50, 630)" filter="url(#shadow)">
    <rect width="900" height="120" rx="10" fill="url(#step5Grad)"/>
    <text x="450" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#fff">🔄 步骤 5: 训练循环</text>

    <g transform="translate(20, 45)">
      <!-- Training loop sub-steps -->
      <rect width="100" height="60" rx="5" fill="rgba(255,255,255,0.2)"/>
      <text x="50" y="20" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">1. Forward</text>
      <text x="50" y="35" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">2. Loss</text>
      <text x="50" y="50" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">3. Backward</text>

      <line x1="110" y1="30" x2="130" y2="30" stroke="#fff" stroke-width="2"/>

      <rect x="140" width="100" height="60" rx="5" fill="rgba(255,255,255,0.2)"/>
      <text x="190" y="20" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">4. Gradient Sync</text>
      <text x="190" y="35" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">(DDP/DeepSpeed)</text>
      <text x="190" y="50" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">5. Optimizer Step</text>

      <line x1="250" y1="30" x2="270" y2="30" stroke="#fff" stroke-width="2"/>

      <rect x="280" width="100" height="60" rx="5" fill="rgba(255,255,255,0.2)"/>
      <text x="330" y="20" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">6. LR Scheduler</text>
      <text x="330" y="35" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">7. Log Metrics</text>
      <text x="330" y="50" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">8. Save Checkpoint</text>

      <!-- Trainer box -->
      <rect x="420" width="200" height="60" rx="5" fill="rgba(255,255,255,0.4)"/>
      <text x="520" y="25" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">Trainer.train()</text>
      <text x="520" y="45" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">自动执行所有步骤</text>

      <!-- Output -->
      <rect x="660" width="220" height="60" rx="5" fill="rgba(255,255,255,0.5)"/>
      <text x="770" y="25" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">输出目录</text>
      <text x="770" y="45" text-anchor="middle" font-family="Arial" font-size="9" fill="#fff">checkpoint-*.pt / adapter_config.json</text>
    </g>
  </g>

  <!-- Final merge and export -->
  <g transform="translate(50, 770)" filter="url(#shadow)">
    <rect width="900" height="100" rx="10" fill="#34495e"/>
    <text x="450" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#fff">📤 步骤 6: 合并与导出 (可选)</text>

    <g transform="translate(20, 45)">
      <rect width="130" height="40" rx="5" fill="#e74c3c"/>
      <text x="65" y="25" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">merge_adapter()</text>

      <line x1="140" y1="20" x2="160" y2="20" stroke="#666" stroke-width="2"/>

      <rect x="170" width="130" height="40" rx="5" fill="#3498db"/>
      <text x="235" y="25" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">quantize(GGUF)</text>

      <line x1="310" y1="20" x2="330" y2="20" stroke="#666" stroke-width="2"/>

      <rect x="340" width="130" height="40" rx="5" fill="#2ecc71"/>
      <text x="405" y="25" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">export_ollama()</text>

      <line x1="480" y1="20" x2="500" y2="20" stroke="#666" stroke-width="2"/>

      <rect x="510" width="130" height="40" rx="5" fill="#f39c12"/>
      <text x="575" y="25" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">push_to_hub()</text>

      <line x1="650" y1="20" x2="670" y2="20" stroke="#666" stroke-width="2"/>

      <rect x="680" width="200" height="40" rx="5" fill="#27ae60"/>
      <text x="780" y="25" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">✅ 部署完成！</text>
    </g>
  </g>
</svg>
