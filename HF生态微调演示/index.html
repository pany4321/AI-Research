<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>HF 微调生态与 LLaMA-Factory 框架技术分析 · 演示</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #E8E6DE;
    overflow: hidden;
    font-family: -apple-system, "PingFang SC", sans-serif;
  }
  #stage {
    position: fixed;
    top: 50%; left: 50%;
    transform-origin: top left;
    will-change: transform;
    box-shadow: 0 10px 60px rgba(0,0,0,0.25);
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #F7F5F0;
  }
  .counter {
    position: fixed;
    bottom: 20px; right: 20px;
    background: rgba(0,0,0,0.65);
    color: #fff;
    padding: 5px 14px;
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
    z-index: 100;
    user-select: none;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .counter:hover { opacity: 1; }
  .counter .label { color: rgba(255,255,255,0.65); margin-left: 8px; }
  .nav-zone {
    position: fixed;
    top: 0; bottom: 0;
    width: 15%;
    cursor: pointer;
    z-index: 50;
  }
  .nav-zone.left  { left: 0; }
  .nav-zone.right { right: 0; }
  .nav-hint {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 44px; height: 44px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .nav-zone.left  .nav-hint { left: 20px; }
  .nav-zone.right .nav-hint { right: 20px; }
  .nav-zone:hover .nav-hint { opacity: 1; }

  @media print {
    @page { size: 960pt 540pt; margin: 0; }
    html, body { background: #F7F5F0; overflow: visible; height: auto; }
    #stage { position: static; transform: none !important; box-shadow: none; }
    .counter, .nav-zone { display: none !important; }
    .print-stack { display: block; }
    .print-stack iframe {
      width: 960pt;
      height: 540pt;
      page-break-after: always;
      display: block;
    }
  }
</style>
</head>
<body>

<div id="stage">
  <iframe id="frame" src="about:blank"></iframe>
</div>

<div class="nav-zone left"  id="navL"><div class="nav-hint">‹</div></div>
<div class="nav-zone right" id="navR"><div class="nav-hint">›</div></div>
<div class="counter" id="counter">1 / 14</div>

<div class="print-stack" id="printStack" style="display:none;"></div>

<script>
  window.DECK_MANIFEST = [
    { file: "slides/01-cover.html",       label: "封面" },
    { file: "slides/02-toc.html",         label: "目录" },
    { file: "slides/03-architecture.html", label: "六层技术栈全景" },
    { file: "slides/04-transformers.html", label: "Transformers" },
    { file: "slides/05-datasets.html",    label: "Datasets" },
    { file: "slides/06-accelerate.html",  label: "Accelerate" },
    { file: "slides/07-peft.html",        label: "PEFT" },
    { file: "slides/08-collaboration.html", label: "四库协作" },
    { file: "slides/09-llama-overview.html", label: "LLaMA-Factory 概览" },
    { file: "slides/10-llama-internal.html", label: "LLaMA-Factory 架构" },
    { file: "slides/11-unsloth.html",     label: "Unsloth" },
    { file: "slides/12-axolotl.html",    label: "Axolotl" },
    { file: "slides/13-comparison.html",  label: "三大框架对比" },
    { file: "slides/14-summary.html",     label: "总结与推荐" },
  ];
  window.DECK_WIDTH = 1920;
  window.DECK_HEIGHT = 1080;
</script>

<script>
(function () {
  const W = window.DECK_WIDTH || 960;
  const H = window.DECK_HEIGHT || 540;
  const deck = window.DECK_MANIFEST || [];
  const stage = document.getElementById('stage');
  const frame = document.getElementById('frame');
  const counter = document.getElementById('counter');
  const printStack = document.getElementById('printStack');
  const storageKey = 'hf-deck-' + location.pathname;
  let current = 0;

  stage.style.width  = W + 'px';
  stage.style.height = H + 'px';

  function fit() {
    const s = Math.min(window.innerWidth / W, window.innerHeight / H);
    const x = (window.innerWidth  - W * s) / 2;
    const y = (window.innerHeight - H * s) / 2;
    stage.style.transform = 'translate(' + x + 'px, ' + y + 'px) scale(' + s + ')';
    stage.style.top = '0';
    stage.style.left = '0';
  }

  function show(idx) {
    if (idx < 0 || idx >= deck.length) return;
    current = idx;
    frame.src = deck[idx].file;
    counter.innerHTML = (idx + 1) + ' / ' + deck.length + ' <span class="label">' + (deck[idx].label || '') + '</span>';
    try { localStorage.setItem(storageKey, String(idx)); } catch (_) {}
    if (location.hash !== '#' + (idx + 1)) {
      history.replaceState(null, '', '#' + (idx + 1));
    }
  }

  function next() { show(Math.min(current + 1, deck.length - 1)); }
  function prev() { show(Math.max(current - 1, 0)); }

  document.addEventListener('keydown', function (e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch (e.key) {
      case 'ArrowRight': case ' ': case 'PageDown': e.preventDefault(); next(); break;
      case 'ArrowLeft':  case 'PageUp':              e.preventDefault(); prev(); break;
      case 'Home': e.preventDefault(); show(0); break;
      case 'End':  e.preventDefault(); show(deck.length - 1); break;
      case 'p': case 'P': window.print(); break;
      default:
        if (e.key >= '1' && e.key <= '9') {
          var i = parseInt(e.key, 10) - 1;
          if (i < deck.length) { e.preventDefault(); show(i); }
        }
    }
  });

  document.getElementById('navL').addEventListener('click', prev);
  document.getElementById('navR').addEventListener('click', next);
  window.addEventListener('resize', fit);
  window.addEventListener('hashchange', function () {
    var m = location.hash.match(/^#(\d+)$/);
    if (m) show(parseInt(m[1], 10) - 1);
  });

  var hashMatch = location.hash.match(/^#(\d+)$/);
  if (hashMatch) current = Math.min(parseInt(hashMatch[1], 10) - 1, deck.length - 1);
  else try {
    var v = parseInt(localStorage.getItem(storageKey), 10);
    if (!isNaN(v) && v >= 0 && v < deck.length) current = v;
  } catch (_) {}
  fit();
  show(current);

  window.addEventListener('beforeprint', function () {
    printStack.innerHTML = '';
    deck.forEach(function (item) {
      var f = document.createElement('iframe');
      f.src = item.file;
      printStack.appendChild(f);
    });
    printStack.style.display = 'block';
    document.getElementById('stage').style.display = 'none';
  });
  window.addEventListener('afterprint', function () {
    printStack.innerHTML = '';
    printStack.style.display = 'none';
    document.getElementById('stage').style.display = '';
  });
})();
</script>

</body>
</html>
